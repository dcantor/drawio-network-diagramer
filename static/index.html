<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Diagram Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: #036897;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { display: block; }

    h1 { font-size: 1.35rem; font-weight: 700; color: #1a202c; }
    p.subtitle { font-size: 0.85rem; color: #718096; margin-top: 0.15rem; }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a0aec0;
      margin: 1.5rem 0 0.75rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.35rem;
    }

    .field label span {
      font-weight: 400;
      color: #a0aec0;
      font-size: 0.78rem;
    }

    .field input {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 7px;
      font-size: 1rem;
      color: #2d3748;
      transition: border-color 0.15s;
      outline: none;
    }

    .field input:focus { border-color: #036897; }

    .required-badge {
      display: inline-block;
      background: #ebf8ff;
      color: #036897;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .optional-badge {
      display: inline-block;
      background: #f7fafc;
      color: #a0aec0;
      font-size: 0.68rem;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .vendor-toggle {
      display: flex;
      gap: 0.75rem;
    }

    .vendor-option {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      padding: 0.45rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #4a5568;
      transition: border-color 0.15s, background 0.15s;
    }

    .vendor-option:has(input:checked) {
      border-color: #036897;
      background: #ebf8ff;
      color: #036897;
    }

    .vendor-option input { display: none; }

    .checkbox-row {
      display: flex;
      gap: 1rem;
      margin-top: 0.75rem;
    }

    .checkbox-option {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: #4a5568;
      cursor: pointer;
    }

    .checkbox-option input { accent-color: #036897; }

    button[type="submit"] {
      margin-top: 2rem;
      width: 100%;
      padding: 0.8rem;
      background: #036897;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button[type="submit"]:hover:not(:disabled) { background: #025a82; }
    button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }

    #status {
      margin-top: 1rem;
      font-size: 0.85rem;
      min-height: 1.2em;
      text-align: center;
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
    }

    #status.success { color: #276749; background: #f0fff4; }
    #status.error   { color: #9b2c2c; background: #fff5f5; }
    #status.loading { color: #2c5282; background: #ebf8ff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="6" height="6" rx="1"/><rect x="16" y="2" width="6" height="6" rx="1"/>
          <rect x="9" y="16" width="6" height="6" rx="1"/>
          <line x1="5" y1="8" x2="12" y2="16"/><line x1="19" y1="8" x2="12" y2="16"/>
        </svg>
      </div>
      <div>
        <h1>Network Diagram Generator</h1>
        <p class="subtitle">Generates a Cisco leaf-spine topology in draw.io format</p>
      </div>
    </div>

    <form id="form" novalidate>
      <div class="section-label">Vendor <span class="required-badge">required</span></div>
      <div class="field">
        <label for="vendor">Switch vendor</label>
        <div class="vendor-toggle">
          <label class="vendor-option">
            <input type="radio" name="vendor" value="cisco" checked>
            <span>Cisco</span>
          </label>
          <label class="vendor-option">
            <input type="radio" name="vendor" value="arista">
            <span>Arista</span>
          </label>
        </div>
      </div>

      <div class="section-label">Core fabric <span class="required-badge">required</span></div>
      <div class="grid">
        <div class="field">
          <label for="spines">Spine switches</label>
          <input id="spines" type="number" value="4" min="1" max="20" required>
        </div>
        <div class="field">
          <label for="leaves">Leaf switches</label>
          <input id="leaves" type="number" value="10" min="1" max="40" required>
        </div>
      </div>

      <div class="section-label">Edge layers <span class="optional-badge">optional</span></div>
      <div class="grid">
        <div class="field">
          <label for="super_spines">Super spines <span>(between borders &amp; spines)</span></label>
          <input id="super_spines" type="number" value="0" min="0" max="10">
        </div>
        <div class="field" id="fabrics-field" style="display:none">
          <label for="fabrics">Fabrics <span>(pods below super spine)</span></label>
          <input id="fabrics" type="number" value="1" min="1" max="10">
        </div>
        <div class="field">
          <label for="borders">Border switches <span>(above spines)</span></label>
          <input id="borders" type="number" value="0" min="0" max="10">
        </div>
        <div class="field">
          <label for="wan">WAN routers <span>(above borders)</span></label>
          <input id="wan" type="number" value="0" min="0" max="10">
        </div>
      </div>

      <div class="section-label">Services <span class="optional-badge">optional</span></div>
      <div class="checkbox-row">
        <label class="checkbox-option">
          <input type="checkbox" id="include_firewalls" checked>
          <span>Firewalls</span>
        </label>
        <label class="checkbox-option">
          <input type="checkbox" id="include_lbs" checked>
          <span>Load balancers</span>
        </label>
        <label class="checkbox-option">
          <input type="checkbox" id="include_dns">
          <span>DNS servers</span>
        </label>
        <label class="checkbox-option">
          <input type="checkbox" id="include_ntp">
          <span>NTP servers</span>
        </label>
      </div>

      <div class="section-label">Output <span class="optional-badge">optional</span></div>
      <div class="grid">
        <div class="field">
          <label for="filename">Filename <span>(.drawio will be appended)</span></label>
          <input id="filename" type="text" placeholder="leaf_spine" maxlength="128">
        </div>
        <div class="field">
          <label for="mgmt_pool">Management IP pool <span>(e.g. 10.0.0.0/24)</span></label>
          <input id="mgmt_pool" type="text" placeholder="e.g. 10.0.0.0/24" maxlength="64">
        </div>
      </div>

      <div class="field">
        <label for="vlan_map">VLAN map <span>(optional — adds a Logical Details tab)</span></label>
        <textarea id="vlan_map" rows="3" placeholder="e.g. leaf1: 10,20,30, leaf2: 10,40, leaf3: 20,50" style="width:100%;box-sizing:border-box;font-family:monospace;font-size:13px;padding:6px;border:1px solid #ccc;border-radius:4px;resize:vertical;"></textarea>
      </div>

      <button type="submit" id="btn">Generate &amp; Download</button>
    </form>

    <div id="status"></div>
  </div>

  <script>
    const form   = document.getElementById("form");
    const btn    = document.getElementById("btn");
    const status = document.getElementById("status");

    document.getElementById("super_spines").addEventListener("input", function () {
      const show = parseInt(this.value, 10) > 0;
      document.getElementById("fabrics-field").style.display = show ? "" : "none";
      if (!show) document.getElementById("fabrics").value = "1";
    });

    function setStatus(msg, type) {
      status.textContent = msg;
      status.className = type;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const vendor  = document.querySelector('input[name="vendor"]:checked').value;
      const spines  = parseInt(document.getElementById("spines").value, 10);
      const leaves  = parseInt(document.getElementById("leaves").value, 10);
      const borders      = parseInt(document.getElementById("borders").value, 10) || 0;
      const wan          = parseInt(document.getElementById("wan").value, 10) || 0;
      const super_spines = parseInt(document.getElementById("super_spines").value, 10) || 0;
      const fabrics      = parseInt(document.getElementById("fabrics").value, 10) || 1;
      const include_firewalls = document.getElementById("include_firewalls").checked;
      const include_lbs       = document.getElementById("include_lbs").checked;
      const include_dns       = document.getElementById("include_dns").checked;
      const include_ntp       = document.getElementById("include_ntp").checked;
      const filename  = document.getElementById("filename").value.trim() || "leaf_spine";
      const mgmt_pool = document.getElementById("mgmt_pool").value.trim() || null;
      const vlan_map  = document.getElementById("vlan_map").value.trim() || null;

      btn.disabled = true;
      setStatus("Generating diagram…", "loading");

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ spines, leaves, borders, wan, super_spines, fabrics, vendor, include_firewalls, include_lbs, include_dns, include_ntp, mgmt_pool, vlan_map, filename }),
        });

        if (!res.ok) {
          const err = await res.json();
          setStatus("Error: " + (err.detail ?? res.statusText), "error");
          return;
        }

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href     = url;
        const disposition = res.headers.get("Content-Disposition") ?? "";
        const nameMatch   = disposition.match(/filename="([^"]+)"/);
        a.download = nameMatch ? nameMatch[1] : `${filename}.drawio`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        const nodes = spines + leaves + borders + wan + 4; // approx with fw/lb
        setStatus(`Downloaded — ~${nodes} nodes, open in diagrams.net to view.`, "success");
      } catch (err) {
        setStatus("Network error: " + err.message, "error");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
